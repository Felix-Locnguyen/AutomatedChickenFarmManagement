    (function() {
        function handleNavClick(e) {
            var target = e.currentTarget;
            var items = document.querySelectorAll('.fab-nav-item');
            items.forEach(function(item) { item.classList.remove('active'); });
            target.classList.add('active');
        }
        var navItems = document.querySelectorAll('.fab-nav-item');
        navItems.forEach(function(item) { item.addEventListener('click', handleNavClick); });
    })();

    <script>
    // Camera List - Danh sách camera
    (function() {
        'use strict';

        if (!isAuthenticated()) {
            window.location.href = '/login';
            return;
        }

        const cameraContainer = document.getElementById('camera-list-container');
        let allCameraData = { coops: [], coopCameras: {} };

        async function loadCameras() {
            try {
                const coops = await coopsAPI.getWithCamera();

                if (cameraContainer && coops && coops.length > 0) {
                    const cameras = await cameraAPI.getAll();
                    const coopCameras = {};
                    cameras.forEach(cam => {
                        if (cam.coops && cam.coops.length > 0) {
                            cam.coops.forEach(c => {
                                if (!coopCameras[c.id]) coopCameras[c.id] = [];
                                coopCameras[c.id].push(cam);
                            });
                        }
                    });

                    allCameraData = { coops, coopCameras };

                    filterCameras();
                } else if (cameraContainer) {
                    cameraContainer.innerHTML = '<div class="text-center text-muted py-4"><p><i class="fas fa-video-slash fa-3x text-muted mb-3"></i></p><p>Chưa có chuồng nào được gắn camera</p><p class="text-muted small">Thêm thiết bị camera vào chuồng để hiển thị tại đây</p></div>';
                }
            } catch (error) {
                console.error('Lỗi load cameras:', error);
                showToast('Không thể tải danh sách camera', 'error');
            }
        }

        function filterCameras() {
            const searchInput = document.getElementById('cameraSearchInput');
            const searchTerm = (searchInput?.value || '').toLowerCase().trim();

            if (!allCameraData.coops || allCameraData.coops.length === 0) return;

            // Filter theo tên chuồng (case-insensitive, substring match)
            let filteredCoops = allCameraData.coops;
            if (searchTerm) {
                filteredCoops = allCameraData.coops.filter(coop =>
                    (coop.name || '').toLowerCase().includes(searchTerm)
                );
            }

            // Sắp xếp theo ưu tiên: priority 1 -> 2 -> 3, sau đó tên A-Z
            filteredCoops.sort((a, b) => {
                const priorityA = a.priority || 3;
                const priorityB = b.priority || 3;
                if (priorityA !== priorityB) {
                    return priorityA - priorityB;
                }
                return (a.name || '').localeCompare(b.name || '');
            });

            // Hiển thị không có kết quả
            if (filteredCoops.length === 0 && allCameraData.coops.length > 0) {
                cameraContainer.innerHTML = '<div class="text-center text-muted py-4"><p>Không tìm thấy camera phù hợp</p></div>';
                return;
            }

            // Render camera cards
            cameraContainer.innerHTML = filteredCoops.map(coop => {
                const status = coop.status || 'inactive';
                let statusClass, statusBadge;
                if (status === 'active' || status === 'normal') {
                    statusClass = 'online';
                    statusBadge = '<span class="coop-status-badge online">Bình thường</span>';
                } else if (status === 'warning') {
                    statusClass = 'warning';
                    statusBadge = '<span class="coop-status-badge warning">Cảnh báo</span>';
                } else {
                    statusClass = 'error';
                    statusBadge = '<span class="coop-status-badge error">Lỗi</span>';
                }

                const coopCams = allCameraData.coopCameras[coop.id] || [];
                const camCount = coopCams.length;
                const camStatus = camCount > 0 ? (coopCams.some(c => c.status === 'online') ? 'Hoạt động' : 'Ngoại tuyến') : 'Chưa có camera';
                const indicatorClass = camCount > 0 ? (coopCams.some(c => c.status === 'online') ? 'online' : 'offline') : 'offline';
                const priorityClass = 'priority-' + (coop.priority || 3);

                return `
                <div class="camera-card status-${statusClass} ${priorityClass}">
                    <div class="camera-card-header">
                        <div class="camera-info">
                            <h5 class="camera-coop-name">${coop.name}</h5>
                            <div class="camera-status">
                                <span class="camera-status-indicator ${indicatorClass}"></span>
                                <span>Camera: ${camStatus}</span>
                            </div>
                        </div>
                        ${statusBadge}
                    </div>
                    <div class="camera-card-footer">
                        <a href="camera-detail.html?coop=${coop.id}" class="btn btn-sm btn-primary btn-check-camera">
                            <i class="fas fa-video"></i> Kiểm tra
                        </a>
                    </div>
                </div>`;
            }).join('');
        }

        loadCameras();
        // Tự động cập nhật mỗi 30 giây
        setInterval(loadCameras, 30000);

        // Real-time search - tìm kiếm theo tên chuồng
        const cameraSearchInput = document.getElementById('cameraSearchInput');
        if (cameraSearchInput) {
            cameraSearchInput.addEventListener('input', function() {
                filterCameras();
            });
        }

        // WebSocket realtime updates - cập nhật thứ tự ưu tiên tự động
        function setupWebSocketListeners() {
            if (!window.wsManager || !window.wsManager.connected) {
                // Fallback: dùng setInterval đã có ở trên (line 815)
                return;
            }

            // Khi có cập nhật trạng thái chuồng
            window.wsManager.subscribe(window.WS_EVENTS.COOP_STATUS, function() {
                loadCameras();
            });

            // Khi có cập nhật thiết bị (offline/online)
            window.wsManager.subscribe(window.WS_EVENTS.DEVICE_STATUS, function() {
                loadCameras();
            });

            // Khi có cập nhật môi trường (nhiệt độ, độ ẩm...)
            window.wsManager.subscribe(window.WS_EVENTS.ENVIRONMENT_UPDATE, function() {
                loadCameras();
            });

            // Khi có cảnh báo mới
            window.wsManager.subscribe(window.WS_EVENTS.ALERT_NEW, function() {
                loadCameras();
            });

            // Khi có chuồng bị xóa - tự động remove khỏi danh sách
            window.wsManager.subscribe(window.WS_EVENTS.COOP_DELETED, function(data) {
                if (!data || !data.coop_id) return;

                // Xóa coop khỏi dữ liệu local
                if (allCameraData.coops && Array.isArray(allCameraData.coops)) {
                    allCameraData.coops = allCameraData.coops.filter(c => c.id !== data.coop_id);
                }

                // Xóa camera data của coop đó
                if (allCameraData.coopCameras && allCameraData.coopCameras[data.coop_id]) {
                    delete allCameraData.coopCameras[data.coop_id];
                }

                // Re-render without page reload
                filterCameras();

                console.log('✓ Camera: Coop ' + data.coop_id + ' removed via WebSocket');
            });

            console.log('✓ Camera page: WebSocket listeners for priority sorting active');
        }

        // Setup WebSocket listeners khi trang load
        if (window.wsManager && window.wsManager.connected) {
            setupWebSocketListeners();
        } else {
            // Đợi WebSocket kết nối
            document.addEventListener('ws:connected', function() {
                setupWebSocketListeners();
            });
        }

        // Get status text - giống coop-detail
        function getCoopStatusText(status) {
            var statusMap = {
                'online': 'Bình thường',
                'active': 'Bình thường',
                'normal': 'Bình thường',
                'warning': 'Cảnh báo',
                'offline': 'Tắt',
                'error': 'Lỗi',
                'cleaning': 'Đang vệ sinh',
                'empty': 'Trống',
                'inactive': 'Tắt'
            };
            return statusMap[status] || status || 'Không xác định';
        }

        // Load coop list from API
        function loadCoopsForCamera() {
            var container = document.getElementById('coopListContainerCamera');
            if (!container) return;

            var apiUrl = '/api/coops/public';
            var token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (token) {
                apiUrl = '/api/coops';
            }

            fetch(apiUrl, {
                headers: token ? { 'Authorization': 'Bearer ' + token } : {}
            })
            .then(function(response) { return response.json(); })
            .then(function(coops) {
                if (!Array.isArray(coops) || coops.length === 0) {
                    container.innerHTML = '<div class="text-muted p-3">Không có dữ liệu chuồng</div>';
                    return;
                }

                    var coopsHtml = coops.map(function(coop) {
                        var status = coop.status || 'inactive';
                        var statusClass;
                        if (status === 'active' || status === 'normal' || status === 'online') {
                            statusClass = 'online';
                        } else if (status === 'warning') {
                            statusClass = 'warning';
                        } else {
                            statusClass = 'error';
                        }

                        return '<div class="coop-summary-card ' + statusClass + '">' +
                            '<div class="coop-summary-header">' +
                            '<span class="coop-summary-name">' + (coop.name || 'Chuồng ' + coop.id) + '</span>' +
                            '<span class="coop-summary-status ' + statusClass + '">' + getCoopStatusText(status) + '</span>' +
                            '</div>' +
                            '<div class="coop-summary-info">' +
                            '<span><i class="fas fa-feather-alt"></i> ' + (coop.current_count || 0) + ' gà</span>' +
                            '<span><i class="fas fa-ruler"></i> ' + (coop.area || 0) + ' m²</span>' +
                            '</div>' +
                            '</div>';
                    }).join('');

                container.innerHTML = coopsHtml + '<a href="/coops" class="btn btn-primary mt-3">Xem tất cả chuồng &rarr;</a>'
            })
            .catch(function(error) {
                console.error('Error loading coops:', error);
                container.innerHTML = '<div class="text-danger p-3">Không thể tải dữ liệu chuồng</div>';
            });
        }

        // Initialize coop list load
        if (document.getElementById('coopListContainerCamera')) {
            loadCoopsForCamera();
            // Refresh every 30 seconds
            setInterval(loadCoopsForCamera, 30000);
        }

        // Load recent devices from API
        function loadRecentDevicesForCamera() {
            var container = document.getElementById('recentDevicesContainerCamera');
            if (!container) return;

            devicesAPI.getAll()
            .then(function(devices) {
                if (!Array.isArray(devices) || devices.length === 0) {
                    container.innerHTML = '<div class="text-muted p-3">Không có thiết bị</div>';
                    return;
                }

                var recentDevices = devices.slice(0, 5);
                var devicesHtml = recentDevices.map(function(device) {
                    var status = device.status || 'offline';
                    var isActive = device.is_active;
                    var statusClass = DeviceStatus.getClass(status, isActive);
                    var statusText = DeviceStatus.getText(status, isActive);

                    return '<div class="device-recent-card ' + statusClass + '">' +
                        '<div class="device-recent-header">' +
                        '<span class="device-recent-name">' + (device.device_name || device.name || 'Thiết bị ' + device.id) + '</span>' +
                        '</div>' +
                        '<div class="device-recent-status">' +
                        '<span class="status-dot ' + statusClass + '"></span>' +
                        '<span class="status-text ' + statusClass + '">' + statusText + '</span>' +
                        '</div>' +
                        '</div>';
                }).join('');

                container.innerHTML = devicesHtml + '<a href="device-list.html" class="btn btn-primary mt-3">Xem tất cả thiết bị &rarr;</a>';
            })
            .catch(function(error) {
                console.error('Error loading recent devices:', error);
                container.innerHTML = '<div class="text-danger p-3">Không thể tải dữ liệu</div>';
            });
        }

        // Initialize recent devices load
        if (document.getElementById('recentDevicesContainerCamera')) {
            loadRecentDevicesForCamera();
            // Refresh every 30 seconds
            setInterval(loadRecentDevicesForCamera, 30000);
        }
    })();
    </script>
